<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haley Li</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background: white;
            color: #222;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .banana {
            width: 120px;
            image-rendering: pixelated;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 24px;
            color: #666;
            margin-bottom: 40px;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .icons a {
            color: #111;
            font-size: 42px;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .icons a:hover {
            transform: translateY(-3px);
            opacity: 0.7;
        }

        /* top-left dropdown nav (moved from top-right) */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            right: auto;
            z-index: 50;
        }

        .dropbtn {
            background: transparent;
            border: none;
            font-size: 20px;
            color: #111;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.15s ease;
        }

        .dropbtn:hover {
            background: rgba(0,0,0,0.05);
        }

        .dropdown-menu {
            margin-top: 8px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-radius: 8px;
            min-width: 160px;
            list-style: none;
            padding: 6px 0;
        }

        .dropdown-menu a {
            display: block;
            padding: 8px 16px;
            color: #111;
            text-decoration: none;
            font-size: 14px;
        }

        .dropdown-menu a:hover {
            background: rgba(0,0,0,0.03);
        }

        /* hide when [hidden] attribute is present */
        .dropdown-menu[hidden] {
            display: none;
        }

        /* utility for screen-reader-only text */
        .visually-hidden {
            position: absolute !important;
            height: 1px; width: 1px;
            overflow: hidden;
            clip: rect(1px, 1px, 1px, 1px);
            white-space: nowrap;
        }
    </style>
</head>

<body>

<!-- added top-left nav -->
<nav class="top-nav" aria-label="Main navigation">
  <div class="dropdown">
    <button id="menuButton" class="dropbtn" aria-expanded="false" aria-controls="nav-menu" aria-haspopup="true">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
      <span class="visually-hidden">Menu</span>
    </button>

    <ul id="nav-menu" class="dropdown-menu" role="menu" hidden>
      <li role="none"><a role="menuitem" href="about.html">About</a></li>
      <li role="none"><a role="menuitem" href="projects.html">Projects</a></li>
      <li role="none"><a role="menuitem" href="haley_li.pdf" target="_blank" rel="noopener noreferrer">Resume</a></li>
    </ul>
  </div>
</nav>

<div class="container">

    <img src="banana.gif" alt="Spinning Banana" class="banana">

    <h1>Haley Li</h1>

    <p class="subtitle">
        CS &amp; Physics at UChicago.
    </p>

    <div class="icons">

        <a href="https://github.com/haleyc0pter" target="_blank">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="https://www.linkedin.com/in/haley0/" target="_blank">
            <i class="fa-brands fa-linkedin"></i>
        </a>

        <a href="mailto:haleyli1234@gmail.com">
            <i class="fa-regular fa-envelope"></i>
        </a>

    </div>

</div>

<script>
  // dropdown toggle + accessibility
  (function () {
    const btn = document.getElementById('menuButton');
    const menu = document.getElementById('nav-menu');

    if (!btn || !menu) return;

    btn.addEventListener('click', (e) => {
      const open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      menu.hidden = open;
      if (!open) {
        const firstLink = menu.querySelector('a');
        if (firstLink) firstLink.focus();
      }
    });

    // close when clicking outside
    document.addEventListener('click', (e) => {
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        btn.setAttribute('aria-expanded', 'false');
        menu.hidden = true;
      }
    });

    // close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        btn.setAttribute('aria-expanded', 'false');
        menu.hidden = true;
        btn.focus();
      }
    });
  })();
</script>

</body>
</html>
