<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haley Li</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background: white;
            color: #222;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .banana {
            width: 120px;
            image-rendering: pixelated;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 24px;
            color: #666;
            margin-bottom: 40px;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .icons a {
            color: #111;
            font-size: 42px;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .icons a:hover {
            transform: translateY(-3px);
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="banana.gif" alt="Spinning Banana" class="banana">

    <h1>Haley Li</h1>

    <p class="subtitle">
        CS &amp; Physics at UChicago.
    </p>

    <div class="icons">

        <a href="https://github.com/haleyc0pter" target="_blank">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="https://www.linkedin.com/in/haley0/" target="_blank">
            <i class="fa-brands fa-linkedin"></i>
        </a>

        <a href="mailto:haleyli1234@gmail.com">
            <i class="fa-regular fa-envelope"></i>
        </a>

    </div>

</div>

</body>
</html>
